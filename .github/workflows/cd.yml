name: CD

on:
  push:
    branches:
      - master
  release:
    types:
      - created
  workflow_dispatch:

jobs:
  build_release_linux:
    name: Build Release Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: .github/scripts/install-ubuntu.sh
      - name: Build
        run: |
          mkdir build && cd build
          cmake \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DENABLE_OPENMP=ON \
            ..
          make -j$(nproc)
      - name: Package
        run: |
          cd build
          make install DESTDIR=appdir
          tar -czf neosolve-linux-x64.tar.gz -C appdir .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/neosolve-linux-x64.tar.gz

  build_release_windows:
    name: Build Release Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: .github/scripts/install-windows.sh
        shell: bash
      - name: Build
        run: .github/scripts/build-windows.sh release openmp
        shell: bash
      - name: Package
        shell: bash
        run: |
          cd build/bin/RelWithDebInfo
          7z a -tzip neosolve-windows-x64.zip solvespace.exe *.dll
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/bin/RelWithDebInfo/neosolve-windows-x64.zip

  build_release_macos:
    name: Build Release macOS
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies
      run: .github/scripts/install-macos.sh ci
    - name: Build
      run: .github/scripts/build-macos.sh release arm64 && .github/scripts/build-macos.sh release x86_64
    - name: Create Universal Binary & DMG
      run: |
        mkdir -p universal/SolveSpace.app/Contents/MacOS
        mkdir -p universal/SolveSpace.app/Contents/Resources
        # Copy app structure from arm64 build
        cp -R build-arm64/bin/SolveSpace.app/Contents/Info.plist universal/SolveSpace.app/Contents/
        cp -R build-arm64/bin/SolveSpace.app/Contents/Resources/* universal/SolveSpace.app/Contents/Resources/ || true
        # Create universal binary with lipo
        lipo -create \
          build-arm64/bin/SolveSpace.app/Contents/MacOS/SolveSpace \
          build/bin/SolveSpace.app/Contents/MacOS/SolveSpace \
          -output universal/SolveSpace.app/Contents/MacOS/SolveSpace
        # Create DMG
        hdiutil create -volname NeoSolve -srcfolder universal -ov -format UDZO NeoSolve.dmg
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos
        path: NeoSolve.dmg

  upload_release_assets:
    name: Upload Release Assets
    needs: [build_release_linux, build_release_windows, build_release_macos]
    if: "!cancelled() && github.event_name == 'release'"
    runs-on: ubuntu-latest
    steps:
    - name: Download All Workflow Artifacts
      uses: actions/download-artifact@v4
    - name: Get Release Upload URL
      id: get_upload_url
      env:
        event: ${{ toJson(github.event) }}
      run: |
        upload_url=$(echo "$event" | jq -r ".release.upload_url")
        echo "upload_url=$upload_url" >> $GITHUB_OUTPUT
        echo "Upload URL: $upload_url"
    - name: Upload neosolve-linux-x64.tar.gz
      uses: actions/upload-release-asset@v1
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.get_upload_url.outputs.upload_url }}
        asset_path: linux/neosolve-linux-x64.tar.gz
        asset_name: neosolve-linux-x64.tar.gz
        asset_content_type: application/gzip
    - name: Upload neosolve-windows-x64.zip
      uses: actions/upload-release-asset@v1
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.get_upload_url.outputs.upload_url }}
        asset_path: windows/neosolve-windows-x64.zip
        asset_name: neosolve-windows-x64.zip
        asset_content_type: application/zip
    - name: Upload SolveSpace.dmg
      uses: actions/upload-release-asset@v1
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.get_upload_url.outputs.upload_url }}
        asset_path: macos/NeoSolve.dmg
        asset_name: NeoSolve.dmg
        asset_content_type: binary/octet-stream
